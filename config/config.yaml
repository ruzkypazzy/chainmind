# ChainMind configuration
#
# Chain data here mirrors the asset bundle in the official
# `pharos-skill-engine` (https://github.com/PharosNetwork/pharos-skill-engine)
# so ChainMind works out of the box on Pharos Pacific Mainnet
# and Pharos Atlantic Testnet.

api_keys:
  openai: "${OPENAI_API_KEY}"

pharos:
  pacific_mainnet:
    chain_id: 1672
    name: "Pharos Pacific Mainnet"
    rpc_url: "https://rpc.pharos.xyz"
    explorer_url: "https://www.pharosscan.xyz"
    symbol: "PROS"
  atlantic_testnet:
    chain_id: 688689
    name: "Pharos Atlantic Testnet"
    rpc_url: "https://atlantic.dplabs-internal.com"
    explorer_url: "https://atlantic.pharosscan.xyz"
    symbol: "PHRS"

analysis:
  cache_ttl_seconds: 300
  max_results_per_query: 50
  default_openai_model: "gpt-4o"
  default_openai_mini_model: "gpt-4o-mini"
